<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOWARE — SHOP</title>
<style>
  :root{
    --black:#000000;
    --white:#FFFFFF;
    --gray:#767676;
    --line:#000000;
    --gray-bg:#F5F5F5;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:Helvetica,"Helvetica Neue",Arial,sans-serif;
    color:var(--black);
    background:var(--white);
    font-weight:300;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit;}
  img{max-width:100%;display:block;}

  .container{
    max-width:1280px;
    margin:0 auto;
    padding:0 20px;
  }

  /* ===== GNB ===== */
  .gnb{
    position:sticky;
    top:0;
    z-index:100;
    background:var(--white);
    border-bottom:1px solid var(--line);
  }
  .gnb-inner{
    display:flex;
    align-items:center;
    height:64px;
    gap:44px;
  }
  .gnb-logo{
    font-size:18px;
    font-weight:700;
    letter-spacing:.3em;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .gnb-nav{
    display:none;
    align-items:center;
    gap:26px;
    flex:1;
  }
  .gnb-nav a{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    white-space:nowrap;
    padding-bottom:2px;
    border-bottom:1px solid transparent;
  }
  .gnb-nav a.active{border-bottom-color:var(--black);}
  @media (min-width:900px){
    .gnb-nav{display:flex;}
  }
  .gnb-right{
    display:flex;
    align-items:center;
    gap:20px;
    margin-left:auto;
  }
  .gnb-right a{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .gnb-right .gnb-links{
    display:none;
    align-items:center;
    gap:20px;
  }
  @media (min-width:900px){
    .gnb-right .gnb-links{display:flex;}
  }
  .icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px;
    height:22px;
  }
  .icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.3;}

  /* ===== Category header ===== */
  .cate-head{
    padding:40px 0 20px;
  }
  .cate-title{
    font-size:22px;
    letter-spacing:.15em;
    text-transform:uppercase;
    margin-bottom:22px;
  }
  .cate-subnav{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
  }
  .cate-subnav button{
    font-size:13px;
    letter-spacing:.03em;
    color:var(--gray);
    padding-bottom:4px;
    border-bottom:1px solid transparent;
  }
  .cate-subnav button.active{
    color:var(--black);
    border-bottom-color:var(--black);
  }

  /* ===== Product grid ===== */
  .cate-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:24px 16px;
    padding:30px 0 90px;
  }
  @media (min-width:768px){
    .cate-grid{grid-template-columns:repeat(4,1fr);gap:28px;}
  }
  .cate-card{
    position:relative;
    opacity:0;
    transform:translateY(40px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .cate-card.in-view{
    opacity:1;
    transform:translateY(0);
  }
  .cate-media{position:relative;margin-bottom:14px;}
  .cate-thumb{
    width:100%;
    aspect-ratio:4/5;
    background:var(--gray-bg);
    overflow:hidden;
    position:relative;
    cursor:ns-resize;
  }
  .cate-thumb img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:auto;
    transform:translateY(0);
  }
  .cate-name{
    font-size:13px;
    letter-spacing:.02em;
    margin-bottom:6px;
  }
  .cate-price{
    font-size:13px;
    letter-spacing:.02em;
    color:var(--gray);
  }
  .cate-cta{
    position:absolute;
    left:16px;
    bottom:16px;
    display:flex;
    gap:8px;
    z-index:2;
    width:max-content;
  }
  .pill-btn{
    background:var(--black);
    color:var(--white);
    border:1px solid var(--black);
    border-radius:999px;
    padding:10px 20px;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    transition:background .15s,color .15s;
    white-space:nowrap;
  }
  .pill-btn:hover{
    background:var(--white);
    color:var(--black);
  }

  /* ===== Footer ===== */
  .footer{
    background:var(--black);
    color:var(--white);
    padding:56px 0 40px;
  }
  .footer-logo{
    font-size:16px;
    letter-spacing:.35em;
    text-transform:uppercase;
    margin-bottom:26px;
  }
  .footer-info{
    font-size:11px;
    letter-spacing:.03em;
    color:#B5B5B5;
    line-height:1.9;
    margin-bottom:26px;
  }
  .footer-links{
    display:flex;
    gap:20px;
    margin-bottom:30px;
  }
  .footer-links a{
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--white);
    border-bottom:1px solid var(--white);
    padding-bottom:2px;
  }
  .footer-bottom{
    font-size:10px;
    letter-spacing:.05em;
    color:#767676;
    border-top:1px solid #333;
    padding-top:20px;
  }
</style>
</head>
<body>

  <!-- GNB -->
  <header class="gnb">
    <div class="container gnb-inner">
      <a href="main.html" class="gnb-logo">LOWARE</a>
      <nav class="gnb-nav" id="gnbNav">
        <a href="category.html?cate=outwear" data-cate="outwear">Outwear</a>
        <a href="category.html?cate=tops" data-cate="tops">Tops</a>
        <a href="category.html?cate=dresses" data-cate="dresses">Dresses</a>
        <a href="category.html?cate=bottoms" data-cate="bottoms">Bottoms</a>
        <a href="category.html?cate=accessories" data-cate="accessories">Accessories</a>
      </nav>
      <div class="gnb-right">
        <div class="gnb-links">
          <a href="#">Cart</a>
          <a href="#">Sign In</a>
          <a href="#">Notice</a>
        </div>
        <button class="icon-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="cate-head">
      <div class="cate-title" id="cateTitle">Outwear</div>
      <div class="cate-subnav" id="cateSubnav"></div>
    </div>
    <div class="cate-grid" id="cateGrid"></div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-logo">LOWARE</div>
      <div class="footer-info">
        COMPANY LOWARE&nbsp;&nbsp;|&nbsp;&nbsp;CEO 홍길동<br>
        서울특별시 성동구 성수동 000-00, 3F<br>
        사업자등록번호 000-00-00000&nbsp;&nbsp;|&nbsp;&nbsp;통신판매업신고 제0000-서울성동-0000호<br>
        Email contact@loware.co.kr&nbsp;&nbsp;|&nbsp;&nbsp;Tel 02-0000-0000
      </div>
      <div class="footer-links">
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Policy</a>
      </div>
      <div class="footer-bottom">
        © LOWARE. ALL RIGHTS RESERVED.
      </div>
    </div>
  </footer>

<script>
  var CATEGORIES = {
    outwear: {
      title: 'Outwear',
      subnav: ['All', 'Cardigan', 'Shirts'],
      products: [
        {name:'Trench Glow Leather Crop Jacket', price:121000, img:'images/jacket-main.jpg'},
        {name:'Lace Open Tie Cardigan', price:30000, img:'images/outer-01-tie-cardigan.jpg'},
        {name:'Mild Tencel V Neck Cardigan', price:32000, img:'images/outer-02-tencel-cardigan.jpg'},
        {name:'Summer Leaf Knit Cardigan', price:38000, img:'images/outer-03-leaf-knit-cardigan.jpg'},
        {name:'Flow Golgi Bollero Cardigan', price:37000, img:'images/outer-04-bollero-cardigan.jpg'},
        {name:'Linen Pure Over Shirts', price:35000, img:'images/outer-05-linen-shirts.jpg'},
        {name:'Linen Wrap Two Way Cardigan', price:35000, img:'images/outer-06-wrap-cardigan.jpg'},
        {name:'Shoulder Ribbon Ruffle Cardigan', price:29000, img:'images/outer-07-ribbon-cardigan.jpg'},
        {name:'Off Shoulder Slit Button Cardigan', price:32000, img:'images/outer-08-slit-button-cardigan.jpg'}
      ]
    },
    tops: {
      title: 'Tops',
      subnav: ['All', 'Blouse', 'Tee'],
      products: [
        {name:'Pure Lace Frill Blouse', price:28000, img:'images/new-01-lace-blouse.jpg'},
        {name:'Beads Halter Two Way Top', price:33000, img:'images/new-03-halter-top.jpg'},
        {name:'Lip Shirring Off Tee', price:28000, img:'images/new-04-shirring-tee.jpg'},
        {name:'Halter Wrap Ribbon Blouse', price:29000, img:'images/top-01-halter-wrap-blouse.jpg'},
        {name:'V Shirring Line Tee', price:27000, img:'images/top-02-v-shirring-tee.jpg'},
        {name:'3 Button Slim Top', price:20000, img:'images/top-03-slim-top.jpg'},
        {name:'Mini Lace Pad Top', price:33000, img:'images/top-04-lace-pad-top.jpg'},
        {name:'Reversible Twist Cut Out Top', price:28000, img:'images/top-05-twist-cutout-top.jpg'}
      ]
    },
    bottoms: {
      title: 'Bottoms',
      subnav: ['All', 'Jeans', 'Pants', 'Shorts'],
      products: [
        {name:'Crack Multi Cargo Wide Pants', price:52000, img:'images/new-02-cargo-pants.jpg'},
        {name:'Western Pocket Stud Boots Cut Jeans', price:48000, img:'images/bottom-01-boots-cut-jeans.jpg'},
        {name:'Fade Old Damage Maxi Jeans', price:46000, img:'images/bottom-02-damage-maxi-jeans.jpg'},
        {name:'Roll Up Shirring Capri Pants', price:41000, img:'images/bottom-03-capri-pants.jpg'},
        {name:'Low Shadow Long Leg Jeans', price:44000, img:'images/bottom-04-long-leg-jeans.jpg'},
        {name:'Double Button Structure Shorts', price:46000, img:'images/bottom-05-structure-shorts.jpg'},
        {name:'Frayed Low Rise Shorts', price:52000, img:'images/bottom-06-low-rise-shorts.jpg'},
        {name:'Cross Ethnic Embroidery Boots Cut Jeans', price:41000, img:'images/bottom-07-embroidery-jeans.jpg'}
      ]
    },
    accessories: {
      title: 'Accessories',
      subnav: ['All', 'Necklace', 'Bracelet', 'Belt'],
      products: [
        {name:'Hippie Feather Pandent Necklace', price:19000, img:'images/acc-01-feather-necklace.jpg'},
        {name:'6 Set Bling Bracelet', price:22000, img:'images/acc-02-bling-bracelet.jpg'},
        {name:'Antique Tribal Necklace', price:19000, img:'images/acc-03-tribal-necklace.jpg'},
        {name:'Brown Marble Bangle', price:20000, img:'images/acc-04-marble-bangle.jpg'},
        {name:'Colorful Bohemian Wood Necklace Set', price:26000, img:'images/acc-05-wood-necklace-set.jpg'},
        {name:'Bold Wave Western Belt', price:22000, img:'images/acc-06-western-belt.jpg'},
        {name:'Double Cubic Cross Necklace', price:19000, img:'images/acc-07-cross-necklace.jpg'},
        {name:'Cutting Zipper Stud Cap', price:27000, img:'images/acc-08-stud-cap.jpg'}
      ]
    },
    dresses: {
      title: 'Dresses',
      subnav: ['All', 'New'],
      products: [
        {name:'Pure Lace Frill Blouse', price:28000, img:'images/new-01-lace-blouse.jpg'},
        {name:'Crack Multi Cargo Wide Pants', price:52000, img:'images/new-02-cargo-pants.jpg'},
        {name:'Beads Halter Two Way Top', price:33000, img:'images/new-03-halter-top.jpg'},
        {name:'Lip Shirring Off Tee', price:28000, img:'images/new-04-shirring-tee.jpg'}
      ]
    }
  };

  function formatPrice(n){ return '₩ ' + n.toLocaleString('ko-KR'); }

  function render(){
    var params = new URLSearchParams(location.search);
    var cate = params.get('cate') || 'outwear';
    var data = CATEGORIES[cate] || CATEGORIES.outwear;

    document.title = 'LOWARE — ' + data.title.toUpperCase();
    document.getElementById('cateTitle').textContent = data.title;

    document.querySelectorAll('#gnbNav a').forEach(function(a){
      a.classList.toggle('active', a.dataset.cate === cate);
    });

    var subnav = document.getElementById('cateSubnav');
    subnav.innerHTML = '';
    data.subnav.forEach(function(label, i){
      var btn = document.createElement('button');
      btn.textContent = label;
      if(i === 0) btn.classList.add('active');
      btn.addEventListener('click', function(){
        subnav.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
      });
      subnav.appendChild(btn);
    });

    var grid = document.getElementById('cateGrid');
    grid.innerHTML = '';
    data.products.forEach(function(p, i){
      var card = document.createElement('div');
      card.className = 'cate-card';
      var cta = i === 0 ? '<div class="cate-cta"><a href="index.html" class="pill-btn">Collection</a><a href="#" class="pill-btn">Search</a></div>' : '';
      card.innerHTML =
        '<div class="cate-media">' +
          '<a href="index.html"><div class="cate-thumb"><img src="' + p.img + '" alt="' + p.name + '"></div></a>' + cta +
        '</div>' +
        '<a href="index.html">' +
          '<div class="cate-name">' + p.name + '</div>' +
          '<div class="cate-price">' + formatPrice(p.price) + '</div>' +
        '</a>';
      card.style.transitionDelay = (i % 4) * 0.08 + 's';
      grid.appendChild(card);
    });

    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('in-view');
          observer.unobserve(entry.target);
        }
      });
    }, {threshold:0.15});
    document.querySelectorAll('.cate-card').forEach(function(card){
      observer.observe(card);
    });

    setupImagePan();
  }

  function setupImagePan(){
    document.querySelectorAll('.cate-thumb').forEach(function(thumb){
      var img = thumb.querySelector('img');
      var offset = 0;

      function maxOffset(){
        return Math.max(0, img.offsetHeight - thumb.offsetHeight);
      }

      function applyOffset(){
        offset = Math.max(0, Math.min(maxOffset(), offset));
        img.style.transform = 'translateY(' + (-offset) + 'px)';
      }

      thumb.addEventListener('wheel', function(e){
        if(maxOffset() <= 0) return;
        e.preventDefault();
        offset += e.deltaY * 0.6;
        applyOffset();
      }, {passive:false});

      if(img.complete){ applyOffset(); }
      else{ img.addEventListener('load', applyOffset); }
    });
  }

  render();
</script>

</body>
</html>
